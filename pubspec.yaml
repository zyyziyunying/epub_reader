name: epub_reader
description: "A cross-platform EPUB reader application."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # EPUB 解析
  epubx: ^4.0.0
  xml: ^6.6.1
  html: ^0.15.6
  image: ^3.3.0

  # 本地存储
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.4.0
  path_provider: ^2.1.5
  shared_preferences: ^2.5.4

  # 状态管理
  flutter_riverpod: ^2.6.1

  # UI 组件
  flutter_html: ^3.0.0-beta.2
  file_picker: ^10.3.10

  # 工具类
  uuid: ^4.5.3
  collection: ^1.19.1
  path: ^1.9.1

  flutter_dotenv: ^6.0.0
  go_router: ^17.1.0
  url_launcher: ^6.3.2
  scrollable_positioned_list: ^0.3.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
